<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <div class="container">
        <header>
            <h1><i class="fas fa-users-cog"></i> Employee Management System</h1>
            <p>Manage your workforce efficiently and seamlessly</p>
        </header>

        <main>
            <section class="glass-panel form-section">
                <h2><i class="fas fa-user-plus"></i> <span id="form-title">Add New Employee</span></h2>
                <form id="employee-form">
                    <input type="hidden" id="edit-index" value="-1">
                    
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="empId">Employee ID</label>
                            <input type="text" id="empId" name="empId" placeholder="e.g. EMP1001" required>
                        </div>
                        
                        <div class="input-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" placeholder="John Doe" required>
                        </div>

                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="john.doe@company.com" required>
                        </div>

                        <div class="input-group">
                            <label for="mobile">Mobile Number</label>
                            <input type="tel" id="mobile" name="mobile" placeholder="+1 (555) 000-0000" required>
                        </div>

                        <div class="input-group">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="department">Department</label>
                            <select id="department" name="department" required>
                                <option value="" disabled selected>Select Department</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Marketing">Marketing</option>
                                <option value="HR">Human Resources</option>
                                <option value="Finance">Finance</option>
                                <option value="Sales">Sales</option>
                                <option value="Operations">Operations</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="salary">Salary (USD)</label>
                            <input type="number" id="salary" name="salary" placeholder="60000" min="0" required>
                        </div>

                        <div class="input-group full-width">
                            <label for="address">Address</label>
                            <textarea id="address" name="address" rows="3" placeholder="Enter full address" required></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submit-btn">
                            <i class="fas fa-save"></i> Save Employee
                        </button>
                        <button type="button" class="btn btn-secondary" id="reset-btn">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
            </section>

            <section class="glass-panel table-section">
                <div class="table-header">
                    <h2><i class="fas fa-list-ul"></i> Employee Directory</h2>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search" placeholder="Search employees...">
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table id="employee-table">
                        <thead>
                            <tr>
                                <th>Emp ID</th>
                                <th>Name</th>
                                <th>Contact</th>
                                <th>Department</th>
                                <th>Salary</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employee-list">
                            <!-- Employee rows will be generated here -->
                        </tbody>
                    </table>
                </div>
                
                <div id="no-data-message" class="empty-state hidden">
                    <i class="fas fa-folder-open"></i>
                    <p>No employees found. Add some above!</p>
                </div>
            </section>
        </main>
    </div>

    <!-- View Modal -->
    <div id="view-modal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-btn">&times;</span>
            <h2><i class="fas fa-id-card"></i> Employee Details</h2>
            <div id="modal-details" class="details-grid">
                <!-- Details injected via JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
